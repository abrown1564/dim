<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DIM: Debate Corpus</title>
  <style>
    :root {
      --bg:      #f4efe6;
      --panel:   #fffaf2;
      --ink:     #1f1a17;
      --muted:   #6f655d;
      --line:    #d7c9b7;
      --accent:  #a3472f;
      --shadow:  0 18px 40px rgba(74,46,22,0.08);
      --anti:    #a3472f;
      --pro:     #2e7d55;
      --mixed:   #3a5f8a;
      --neutral: #7a6220;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Palatino Linotype", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(163,71,47,0.12), transparent 28%),
        linear-gradient(180deg, #f7f1e8 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .page { max-width: 1400px; margin: 0 auto; padding: 68px 24px 64px; }
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 0 32px; height: 48px;
      background: rgba(255, 250, 242, 0.88);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line); font-size: 0.85rem; gap: 4px;
    }
    .topnav a { color: var(--accent); text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: background 0.13s; }
    .topnav a:hover { background: rgba(163,71,47,0.08); }

    /* ── hero ─────────────────────────────────────────────────── */
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px 32px 24px;
      margin-bottom: 28px;
    }
    h1 { font-size: clamp(1.6rem, 3.5vw, 2.8rem); line-height: 1.1; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 1rem; line-height: 1.6; }
    nav { font-size: 0.88rem; margin-top: 16px; }
    nav a { color: var(--accent); text-decoration: none; margin-right: 18px; }
    nav a:hover { text-decoration: underline; }

    /* ── filter bar ───────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      align-items: center;
    }
    .filter-label { font-size: 0.85rem; color: var(--muted); margin-right: 4px; }
    .filter-btn {
      font-family: Georgia, serif;
      font-size: 0.85rem;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .filter-btn.stance-anti.active    { background: var(--anti);    border-color: var(--anti); }
    .filter-btn.stance-pro.active     { background: var(--pro);     border-color: var(--pro); }
    .filter-btn.stance-mixed.active   { background: var(--mixed);   border-color: var(--mixed); }
    .filter-btn.stance-neutral.active { background: var(--neutral); border-color: var(--neutral); }

    /* ── card grid ────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ── card ─────────────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 48px rgba(74,46,22,0.13);
    }
    .card.hidden { display: none; }

    .card-stripe { height: 5px; width: 100%; }

    .card-body { padding: 18px 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

    .card-title {
      font-size: 0.97rem;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-topic {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 0.72rem;
      font-family: ui-monospace, monospace;
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: var(--bg);
    }
    .badge.stance { color: #fff; border: none; }
    .badge.stance-anti    { background: var(--anti); }
    .badge.stance-pro     { background: var(--pro); }
    .badge.stance-mixed   { background: var(--mixed); }
    .badge.stance-neutral { background: var(--neutral); }

    .stats-row { display: flex; gap: 14px; font-size: 0.8rem; color: var(--muted); }
    .stat-item strong {
      display: block;
      font-size: 1.15rem;
      color: var(--ink);
      line-height: 1;
      font-family: ui-monospace, monospace;
    }

    .rd-wrap { margin-top: 2px; }
    .rd-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .rd-track { height: 6px; background: #e8dfd2; border-radius: 3px; overflow: hidden; }
    .rd-fill  { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

    .techniques { display: flex; gap: 5px; flex-wrap: wrap; }
    .tech-pill {
      font-size: 0.72rem;
      font-family: ui-monospace, monospace;
      padding: 3px 8px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f5ede0, #ede0cc);
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .tech-count { font-size: 0.65rem; color: var(--muted); margin-left: 2px; }

    /* ── empty state ──────────────────────────────────────────── */
    #empty-state {
      display: none;
      color: var(--muted);
      font-size: 1rem;
      padding: 40px;
      text-align: center;
    }

    /* ── modal overlay ────────────────────────────────────────── */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(31,26,23,0.55);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 40px;
      overflow-y: auto;
    }
    #modal-backdrop.open { display: flex; }

    #modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(31,26,23,0.25);
      width: 100%;
      max-width: 760px;
      position: relative;
      margin: auto;
    }

    .modal-stripe { height: 7px; border-radius: 24px 24px 0 0; }

    .modal-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--line);
    }
    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .modal-title a { color: inherit; text-decoration: none; }
    .modal-title a:hover { color: var(--accent); text-decoration: underline; }

    .modal-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

    .modal-stats {
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 14px;
    }
    .modal-stats .stat-item strong { font-size: 1.3rem; }

    .modal-body { padding: 24px 32px 32px; }

    .modal-section { margin-bottom: 28px; }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-title {
      font-size: 0.78rem;
      font-family: ui-monospace, monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }

    /* tooltip */
    .tooltip-host { position: relative; display: inline; }
    .tooltip-host .tooltip-text {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      background: #2a211a;
      color: #f4efe6;
      font-size: 0.8rem;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 10px;
      pointer-events: none;
      z-index: 100;
      text-align: left;
      font-style: normal;
      font-weight: 400;
    }
    .tooltip-host:hover .tooltip-text { display: block; }
    .tooltip-trigger {
      border-bottom: 1px dashed var(--muted);
      cursor: help;
    }

    /* rhetorical density bar in modal */
    .modal-rd { margin-bottom: 4px; }
    .modal-rd-label {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .modal-rd-track { height: 8px; background: #e8dfd2; border-radius: 4px; overflow: hidden; }
    .modal-rd-fill  { height: 100%; border-radius: 4px; }

    /* technique entries in modal */
    .modal-tech-list { display: flex; flex-direction: column; gap: 18px; }
    .modal-tech-entry {}
    .modal-tech-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .modal-tech-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink);
      cursor: help;
      border-bottom: 1px dashed var(--line);
      position: relative;
    }
    .modal-tech-group {
      font-size: 0.72rem;
      font-family: ui-monospace, monospace;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 2px 8px;
    }
    .modal-tech-count {
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      color: var(--muted);
      margin-left: auto;
    }
    .modal-tech-quote {
      font-size: 0.83rem;
      color: var(--ink);
      border-left: 3px solid var(--line);
      padding: 5px 12px;
      margin-top: 5px;
      line-height: 1.55;
      font-style: italic;
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 22px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--line);
      background: var(--bg);
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }
    .modal-close:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

    /* ── definition tooltip ───────────────────────────────────── */
    .def-tip {
      position: fixed;
      z-index: 200;
      background: var(--ink);
      color: #f4efe6;
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 340px;
      font-size: 0.82rem;
      line-height: 1.55;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }
    .def-tip.visible { opacity: 1; }
    .def-tip-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 5px; color: #fff; }
    .def-tip-text { color: #d4c9be; }
  
      .topnav-home {
        margin-right: auto;
        border: 1px solid rgba(143,59,46,0.28);
        border-radius: 6px;
        font-size: 0.8rem;
        opacity: 0.75;
        letter-spacing: 0.01em;
      }
      .topnav-home:hover { opacity: 1; }
      </style>
</head>
<body>
<nav class="topnav">
      <a href="https://abrown1564.github.io/alice-website/" target="_blank" class="topnav-home">alice brown ↗</a>
  <a href="report.html">Report</a>
  <a href="positions.html">Agora</a>
  <a href="heatmap.html">Heatmap</a>
  <a href="debate.html">Debate</a>
  <a href="taxonomy.html">Taxonomy</a>
  <a href="traditions.html">Traditions</a>
  <a href="map.html">Map</a>
  <a href="dissertation.html">Dissertation</a>
</nav>
<div class="page">

  <div class="hero">
    <h1>Debate Corpus</h1>
    <p class="subtitle">
      All profiled debates, sorted by rhetorical density. Click any card to expand.
    </p>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter by stance:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn stance-anti"    data-filter="anti">anti</button>
    <button class="filter-btn stance-pro"     data-filter="pro">pro</button>
    <button class="filter-btn stance-mixed"   data-filter="mixed">mixed</button>
    <button class="filter-btn stance-neutral" data-filter="neutral">neutral</button>
  </div>

  <div class="card-grid" id="card-grid"></div>
  <p id="empty-state">No debates match this filter.</p>

</div>

<!-- ── Modal overlay ──────────────────────────────────────────────────────── -->
<div id="modal-backdrop">
  <div id="modal">
    <div class="modal-stripe" id="modal-stripe"></div>
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body"   id="modal-body"></div>
  </div>
</div>

<!-- ── Definition tooltip ─────────────────────────────────────────────────── -->
<div class="def-tip" id="def-tip">
  <div class="def-tip-name" id="def-tip-name"></div>
  <div class="def-tip-text" id="def-tip-text"></div>
</div>

<script>
const STANCE_COLOR = { anti:"#a3472f", pro:"#2e7d55", mixed:"#3a5f8a", neutral:"#7a6220", unknown:"#999" };
const MODE_LABEL   = { monologic:"monologic", dialogic:"dialogic", multi_party:"multi-party", unknown:"?" };
const AGREE_LABEL  = { yes:"agreement reached", no:"no agreement", partial:"partial agreement", unknown:"" };

let maxRhetoricalDensity = 1;
let TECH_INFO = {};   // populated from technique_info.json
let ALL_CARDS = [];   // full card data objects, keyed by debate_id

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function modeIcon(mode) {
  return { monologic:"◉", dialogic:"⇄", multi_party:"⊕" }[mode] || "·";
}

// ── Build summary card (grid view) ───────────────────────────────────────────
function buildCard(d) {
  const stanceColor = STANCE_COLOR[d.stance] || "#999";
  const erPct = Math.min(100, (d.rhetorical_density / maxRhetoricalDensity) * 100).toFixed(1);

  const techPills = d.top_techniques.length
    ? d.top_techniques.map(function(t) {
        return '<span class="tech-pill">' + escHtml(t.name) + '<span class="tech-count">\xd7' + t.count + '</span></span>';
      }).join("")
    : '<span style="font-size:0.78rem;color:var(--muted)">no techniques detected</span>';

  const agreeText = AGREE_LABEL[d.agreement] || "";

  return '<div class="card" data-stance="' + d.stance + '" data-id="' + escHtml(d.debate_id) + '">'
    + '<div class="card-stripe" style="background:' + stanceColor + '"></div>'
    + '<div class="card-body">'
    + '<div class="card-title">&ldquo;' + escHtml(d.title) + '&rdquo;</div>'
    + (d.overall_topic ? '<div class="card-topic">' + escHtml(d.overall_topic) + '</div>' : "")
    + '<div class="badges">'
    + '<span class="badge stance stance-' + d.stance + '">' + d.stance + '</span>'
    + '<span class="badge">' + modeIcon(d.discourse_mode) + ' ' + escHtml(MODE_LABEL[d.discourse_mode] || d.discourse_mode) + '</span>'
    + (agreeText ? '<span class="badge">' + escHtml(agreeText) + '</span>' : "")
    + '</div>'
    + '<div class="stats-row">'
    + '<div class="stat-item"><strong>' + d.total_detections + '</strong>detections</div>'
    + '<div class="stat-item"><strong>' + d.claim_count + '</strong>claims</div>'
    + '<div class="stat-item"><strong>' + d.rhetorical_density.toFixed(2) + '</strong>density/unit</div>'
    + '</div>'
    + '<div class="rd-wrap">'
    + '<div class="rd-label"><span class="tooltip-host"><span class="tooltip-trigger">rhetorical density</span><span class="tooltip-text"><strong>Rhetorical density</strong> - negative technique detections divided by argumentative units. Counter-techniques excluded.</span></span><span>' + d.rhetorical_density.toFixed(2) + '</span></div>'
    + '<div class="rd-track"><div class="rd-fill" style="width:' + erPct + '%;background:' + stanceColor + '"></div></div>'
    + '</div>'
    + '<div class="techniques">' + techPills + '</div>'
    + '</div>'
    + '</div>';
}

// ── Build modal content for a card ───────────────────────────────────────────
function openModal(d) {
  const stanceColor = STANCE_COLOR[d.stance] || "#999";
  const erPct = Math.min(100, (d.rhetorical_density / maxRhetoricalDensity) * 100).toFixed(1);
  const agreeText = AGREE_LABEL[d.agreement] || "";

  // stripe
  document.getElementById("modal-stripe").style.background = stanceColor;

  // header
  const titleInner = d.source_url
    ? '<a href="' + escHtml(d.source_url) + '" target="_blank" rel="noopener">&ldquo;' + escHtml(d.title) + '&rdquo; &#8599;</a>'
    : '&ldquo;' + escHtml(d.title) + '&rdquo;';

  const badgesHtml = '<div class="modal-meta">'
    + '<span class="badge stance stance-' + d.stance + '">' + d.stance + '</span>'
    + '<span class="badge">' + modeIcon(d.discourse_mode) + ' ' + escHtml(MODE_LABEL[d.discourse_mode] || d.discourse_mode) + '</span>'
    + (agreeText ? '<span class="badge">' + escHtml(agreeText) + '</span>' : "")
    + (d.consensus !== "unknown" ? '<span class="badge">' + escHtml(d.consensus) + '</span>' : "")
    + '</div>';

  const statsHtml = '<div class="modal-stats">'
    + '<div class="stat-item"><strong>' + d.total_detections + '</strong>total detections</div>'
    + '<div class="stat-item"><strong>' + d.negative_count + '</strong>negative</div>'
    + '<div class="stat-item"><strong>' + d.positive_count + '</strong>positive</div>'
    + '<div class="stat-item"><strong>' + d.claim_count + '</strong>claims</div>'
    + '<div class="stat-item"><strong>' + d.chars.toLocaleString() + '</strong>chars</div>'
    + '</div>';

  document.getElementById("modal-header").innerHTML =
    '<div class="modal-title">' + titleInner + '</div>'
    + (d.overall_topic ? '<div style="font-size:0.9rem;color:var(--muted);margin-bottom:10px">' + escHtml(d.overall_topic) + '</div>' : "")
    + badgesHtml
    + statsHtml;

  // body
  var bodyHtml = '';

  // Rhetorical density bar
  bodyHtml += '<div class="modal-section">'
    + '<div class="modal-section-title">Rhetorical density</div>'
    + '<div class="modal-rd">'
    + '<div class="modal-rd-label"><span class="tooltip-host"><span class="tooltip-trigger">negative detections per argumentative unit</span><span class="tooltip-text"><strong>Rhetorical density</strong> - the number of negative technique detections divided by the number of argumentative units in a debate. A unit is a discrete speaker turn or claim. Higher density means more rhetorical techniques per unit of argument. Counter-techniques (e.g. prolepsis, elenchus) are excluded from the count.</span></span><span>' + d.rhetorical_density.toFixed(3) + '</span></div>'
    + '<div class="modal-rd-track"><div class="modal-rd-fill" style="width:' + erPct + '%;background:' + stanceColor + '"></div></div>'
    + '</div>'
    + '</div>';

  // Techniques list
  if (d.all_techniques && d.all_techniques.length) {
    bodyHtml += '<div class="modal-section"><div class="modal-section-title">Detected techniques</div>';
    bodyHtml += '<div class="modal-tech-list">';
    d.all_techniques.forEach(function(t) {
      var techId = t.name.replace(/ /g, "_");
      var info = TECH_INFO[techId] || {};
      var quotesHtml = (t.quotes && t.quotes.length)
        ? t.quotes.map(function(q) {
            return '<div class="modal-tech-quote">&ldquo;' + escHtml(q) + '&rdquo;</div>';
          }).join("")
        : "";

      bodyHtml += '<div class="modal-tech-entry">'
        + '<div class="modal-tech-header">'
        + '<span class="modal-tech-name" data-tech-id="' + escHtml(techId) + '">' + escHtml(t.name) + '</span>'
        + '<span class="modal-tech-group">' + escHtml(t.group.replace(/_/g, " ")) + '</span>'
        + '<span class="modal-tech-count">\xd7' + t.count + '</span>'
        + '</div>'
        + quotesHtml
        + '</div>';
    });
    bodyHtml += '</div></div>';
  } else {
    bodyHtml += '<div class="modal-section"><p style="color:var(--muted);font-size:0.9rem">No techniques detected in this debate.</p></div>';
  }

  document.getElementById("modal-body").innerHTML = bodyHtml;

  // Wire up definition tooltips for technique names
  document.querySelectorAll(".modal-tech-name[data-tech-id]").forEach(function(el) {
    el.addEventListener("mouseenter", showTip);
    el.addEventListener("mousemove",  moveTip);
    el.addEventListener("mouseleave", hideTip);
  });

  // Open
  document.getElementById("modal-backdrop").classList.add("open");
  document.getElementById("modal-backdrop").scrollTop = 0;
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-backdrop").classList.remove("open");
  document.body.style.overflow = "";
}

// ── Definition tooltip ────────────────────────────────────────────────────────
var tip = document.getElementById("def-tip");
var tipName = document.getElementById("def-tip-name");
var tipText = document.getElementById("def-tip-text");

function showTip(e) {
  var techId = e.currentTarget.dataset.techId;
  var info = TECH_INFO[techId];
  if (!info || !info.def) return;
  tipName.textContent = e.currentTarget.textContent;
  tipText.textContent = info.def;
  tip.classList.add("visible");
  positionTip(e);
}
function moveTip(e) { positionTip(e); }
function hideTip()  { tip.classList.remove("visible"); }

function positionTip(e) {
  var x = e.clientX + 14;
  var y = e.clientY + 14;
  // keep within viewport
  if (x + 360 > window.innerWidth)  x = e.clientX - 360;
  if (y + 120  > window.innerHeight) y = e.clientY - 120;
  tip.style.left = x + "px";
  tip.style.top  = y + "px";
}

// ── Filter logic ──────────────────────────────────────────────────────────────
var activeFilter = "all";

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    applyFilter();
  });
});

function applyFilter() {
  var cards = document.querySelectorAll(".card");
  var visible = 0;
  cards.forEach(function(card) {
    var show = activeFilter === "all" || card.dataset.stance === activeFilter;
    card.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  document.getElementById("empty-state").style.display = visible === 0 ? "block" : "none";
}

// ── Card click → modal ────────────────────────────────────────────────────────
document.getElementById("card-grid").addEventListener("click", function(e) {
  var card = e.target.closest(".card");
  if (!card) return;
  var id = card.dataset.id;
  var d = ALL_CARDS[id];
  if (d) openModal(d);
});

// Close modal
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-backdrop").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

// ── Load data and render ──────────────────────────────────────────────────────
Promise.all([
  fetch("data/corpus_cards.json").then(function(r) { return r.json(); }),
  fetch("data/technique_info.json").then(function(r) { return r.json(); }).catch(function() { return {}; }),
]).then(function(results) {
  var cards = results[0];
  var techInfo = results[1];
  TECH_INFO = (techInfo && techInfo.tech) ? techInfo.tech : techInfo;

  maxRhetoricalDensity = Math.max.apply(null, cards.map(function(c) { return c.rhetorical_density; }).concat([1]));

  // Index cards by debate_id for fast modal lookup
  cards.forEach(function(c) { ALL_CARDS[c.debate_id] = c; });

  var grid = document.getElementById("card-grid");
  grid.innerHTML = cards.map(buildCard).join("");
});
</script>
</body>
</html>
